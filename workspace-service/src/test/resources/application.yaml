spring:
  application:
    name: workspace-service
  cloud:
    config:
      enabled: false
  datasource:
    url: jdbc:postgresql://localhost:5432/promptforge_workspace_db
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092

minio:
  url: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  project-bucket: projects

jwt:
  secret: ${JWT_SECRET:PromptForge-jwt-secret-key-for-distributed-system-2026-secure-token-generation}
