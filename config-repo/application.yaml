eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

jwt:
  secret: ${JWT_SECRET:PromptForge-jwt-secret-key-for-distributed-system-2026-secure-token-generation}

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  data:
    redis:
      host: localhost
      port: 6379
  datasource:
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

resilience4j:
  circuitbreaker:
    instances:
      default:
        registerWithEureka: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 5
  retry:
    instances:
      default:
        maxAttempts: 3
        waitDuration: 1s
